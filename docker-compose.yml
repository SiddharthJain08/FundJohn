version: '3.9'

services:
  postgres:
    # pgvector/pgvector:pg16 is the official pgvector image based on debian
    # postgres:16. Swapped from postgres:16-alpine on 2026-04-25 to enable the
    # vector extension for memory_chunks (migration 054). Volume contents
    # carry over — pg16 PGDATA layout is compatible.
    image: pgvector/pgvector:pg16
    container_name: openclaw-postgres
    environment:
      POSTGRES_DB: openclaw
      POSTGRES_USER: openclaw
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./src/database/migrations:/docker-entrypoint-initdb.d
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: openclaw-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
